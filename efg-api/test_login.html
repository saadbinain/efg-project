<!DOCTYPE html>
<html>
<head>
    <title>Test Admin Login</title>
</head>
<body>
    <h2>Test Admin Login</h2>
    <input type="text" id="username" placeholder="username" value="admin"><br><br>
    <input type="password" id="password" placeholder="password" value="password"><br><br>
    <button onclick="login()">Login</button>
    <pre id="result">Waiting...</pre>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Show loading
            document.getElementById('result').innerText = 'Sending request...';
            
            try {
                const response = await fetch('/efg-project/efg-api/api/admin/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
                
                if (data.success) {
                    console.log('Token:', data.token);
                } else {
                    console.log('Login failed:', data.message);
                }
            } catch (error) {
                document.getElementById('result').innerText = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
